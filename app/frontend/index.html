<!DOCTYPE html>
<html>
  <head>
    <title><%= productName %></title>

    <meta charset="utf-8">
    <meta name="description" content="<%= productDescription %>">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    <meta name="viewport" content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, width=device-width<% if (ctx.mode.cordova || ctx.mode.capacitor) { %>, viewport-fit=cover<% } %>">

    <link rel="icon" type="image/ico" href="favicon.ico">
    
    <!-- CRITICAL: Polyfill Object.hasOwn BEFORE any modules load -->
    <!-- This must run synchronously before any JavaScript modules are evaluated -->
    <!-- Object.hasOwn was introduced in ES2022 and is not available in older Android WebView versions -->
    <script>
      (function() {
        if (!Object.hasOwn) {
          Object.hasOwn = function(obj, prop) {
            return Object.prototype.hasOwnProperty.call(obj, prop);
          };
        }
      })();
    </script>
  </head>
  <body>
    <!-- quasar:entry-point -->
  </body>
</html>
