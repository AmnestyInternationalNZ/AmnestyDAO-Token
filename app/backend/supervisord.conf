[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0
pidfile=/run/supervisord.pid

[program:auth-service]
command=node index.js
directory=/app
environment=HOST="0.0.0.0"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:hasura]
command=hasura serve --host 0.0.0.0 --port 8080 --database-url "%(ENV_DATABASE_URL)s" --admin-secret "%(ENV_HASURA_GRAPHQL_ADMIN_SECRET)s" --enable-console "%(ENV_HASURA_GRAPHQL_ENABLE_CONSOLE)s" --dev-mode "%(ENV_HASURA_GRAPHQL_DEV_MODE)s"
directory=/hasura
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0 