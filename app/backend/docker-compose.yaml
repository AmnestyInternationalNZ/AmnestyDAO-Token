services:
  nginx:
    profiles: ["production"]
    build:
      context: ./nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - auth-service
      - graphql-engine
    networks:
      - hrdao_network
    # Start nginx in foreground, reload every 6 hours for certificate renewal
    command: "/bin/sh -c 'nginx -g \"daemon off;\" & NGINX_PID=$$!; (while kill -0 $$NGINX_PID 2>/dev/null; do sleep 6h; nginx -s reload 2>&1 || true; done) & wait $$NGINX_PID'"

  certbot:
    profiles: ["production"]
    image: certbot/certbot
    restart: "no"
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  auth-service:
    build:
      context: ./
      args:
        NODE_ENV: ${NODE_ENV:-development}
    restart: always
    command: sh -c "if [ \"$$NODE_ENV\" = \"production\" ]; then npm start; else npm run dev; fi"
    depends_on:
      postgres:
        condition: service_healthy
    # Ports exposed for dev mode (direct access)
    # In production, access through nginx reverse proxy
    ports:
      - "4000:4000"
    networks:
      - hrdao_network
    environment:
      - PORT=4000
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=${NODE_ENV:-development}
    develop:
      watch:
        - action: sync
          path: ./actions
          target: /usr/src/app/actions
        - action: sync
          path: ./index.js
          target: /usr/src/app/index.js
        - action: sync
          path: ./firebase-admin.js
          target: /usr/src/app/firebase-admin.js
        - action: sync
          path: ./scripts
          target: /usr/src/app/scripts
        - action: rebuild
          path: ./package.json
        - action: rebuild
          path: ./package-lock.json

  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - hrdao_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hrdao} -d ${POSTGRES_DB:-hrdao_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  graphql-engine:
    image: hasura/graphql-engine:v2.25.1
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    # Ports exposed for dev mode (direct access)
    # In production, access through nginx reverse proxy
    ports:
      - "8080:8080"
    networks:
      - hrdao_network
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_DEV_MODE: "true"
      HASURA_GRAPHQL_CORS_DOMAIN: "*"
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_ADMIN_SECRET}
      HASURA_GRAPHQL_JWT_SECRET: |
        {
          "type": "HS256",
          "key": "${JWT_SECRET}",
          "claims_namespace": "https://hasura.io/jwt/claims"
        }

networks:
  hrdao_network:
    driver: bridge

volumes:
  db_data:
  nginx_logs:
