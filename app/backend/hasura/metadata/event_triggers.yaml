- name: transaction_created
  definition:
    enable_manual: false
    insert:
      columns: '*'
    update:
      columns: []
    delete:
      columns: []
  retry_conf:
    interval_sec: 10
    num_retries: 3
    timeout_sec: 60
  webhook_from_env: HASURA_GRAPHQL_ENDPOINT
  headers:
    - name: Content-Type
      value: application/json
  source:
    name: default
    table:
      name: token_transactions
      schema: public 